apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nginx-deployer
  namespace: web-app
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["create", "get", "list", "watch", "update", "patch"]

- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]

- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]

- apiGroups: ["apps"]
  resources: ["replicasets"]
  verbs: ["get", "list", "watch"]

- apiGroups: [""]
  resources: ["services"]
  verbs: ["create", "get", "list", "watch", "update", "patch"]

- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nginx-deployer-binding
  namespace: web-app
subjects:
- kind: User
  name: web-user
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: nginx-deployer
  apiGroup: rbac.authorization.k8s.io